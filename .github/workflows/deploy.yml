name: Deploy Properties 4 Creations P4C Platform

on:
  push:
    branches: [ main, p4c ]
  pull_request:
    branches: [ main, p4c ]

jobs:
  deploy-p4c:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Deploy P4C Static HTML Platform from Main Branch to docs
      if: github.ref == 'refs/heads/main'
      run: |
        # Clean and create docs directory for deployment
        rm -rf docs
        mkdir -p docs

        # Copy all P4C HTML pages (main platform)
        cp -r P4C/*.html docs/
        cp -r P4C/projects docs/

        # Copy all P4C JavaScript files
        cp -r P4C/*.js docs/

        # Copy P4C CSS files
        cp -r P4C/*.css docs/

        # Copy CNAME file for custom domain
        cp -r P4C/CNAME docs/

        # Copy any static assets if they exist
        if [ -d "P4C/images" ]; then cp -r P4C/images docs/; fi

        # Create deployment verification file
        echo "Properties 4 Creations P4C Platform - Deployed $(date)" > docs/deployment-info.txt
        echo "Version: Enterprise Analytics" >> docs/deployment-info.txt

    - name: Deploy Main Branch to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      if: github.ref == 'refs/heads/main'
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs

    - name: Build P4C Deployment Package
      if: github.ref == 'refs/heads/p4c'
      run: |
        # Verify P4C directory exists and has content
        if [ ! -d "P4C" ]; then
          echo "❌ Error: P4C directory not found!"
          exit 1
        fi

        # Check if P4C has HTML files
        if ! ls P4C/*.html 1> /dev/null 2>&1; then
          echo "❌ Error: No HTML files found in P4C directory!"
          exit 1
        fi

        # Clean and create deployment directory
        rm -rf p4c-deploy
        mkdir -p p4c-deploy

        # Selectively copy ONLY the files needed for static site deployment
        echo "📦 Building deployment package with selective files..."

        # Copy HTML pages (main and project pages)
        if ls P4C/*.html 1> /dev/null 2>&1; then
          echo "✅ Copying $(ls P4C/*.html | wc -l) HTML pages"
          cp P4C/*.html p4c-deploy/
        fi

        # Copy JavaScript files
        if ls P4C/*.js 1> /dev/null 2>&1; then
          echo "✅ Copying $(ls P4C/*.js | wc -l) JavaScript files"
          cp P4C/*.js p4c-deploy/
        fi

        # Copy CSS files
        if ls P4C/*.css 1> /dev/null 2>&1; then
          echo "✅ Copying $(ls P4C/*.css | wc -l) CSS files"
          cp P4C/*.css p4c-deploy/
        fi

        # Copy CNAME for custom domain
        if [ -f "P4C/CNAME" ]; then
          echo "✅ Copying CNAME file"
          cp P4C/CNAME p4c-deploy/
        fi

        # Copy any images in P4C directory
        if [ -d "P4C/images" ]; then
          echo "✅ Copying images directory"
          cp -r P4C/images p4c-deploy/
        fi

        # Report what was included
        echo "📋 Deployment package contents:"
        ls -la p4c-deploy/
        echo "📊 Total files: $(find p4c-deploy -type f | wc -l)"

    - name: Deploy P4C Static Site to GitHub Pages
      if: github.ref == 'refs/heads/p4c'
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./p4c-deploy

    - name: Verify Deployment
      run: |
        if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
          echo "🚀 Main Branch - P4C Platform Deployed Successfully!"
          echo "📍 Live URL: https://kyletbuzbee.github.io/Properties4Creations/"
          echo "📊 Analytics Framework Ready for Implementation"
        elif [[ "${{ github.ref }}" == "refs/heads/p4c" ]]; then
          echo "🎯 P4C Static Site Deployed Successfully!"
          echo "📍 Live URL: https://kyletbuzbee.github.io/Properties4Creations/"
          echo "🔄 Deployment handled automatically via GitHub Actions workflow"
        fi
